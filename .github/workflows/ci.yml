name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check pyproject.toml matches __init__.py
        run: python scripts/check_version.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check pycubrid/ tests/
      - name: Ruff format check
        run: ruff format --check pycubrid/ tests/

  offline-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov
      - name: Run offline tests with coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_integration.py \
            -v --tb=short \
            --cov=pycubrid \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10' && github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          verbose: true
          fail_ci_if_error: false
        env:
          CODECOV_RETRIES: 3

  packaging-smoke-test:
    runs-on: ubuntu-latest
    needs: [offline-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Smoke test wheel install
        run: |
          python -m venv /tmp/test-wheel
          /tmp/test-wheel/bin/pip install dist/*.whl
          cd /tmp
          /tmp/test-wheel/bin/python -c "import pycubrid; print(pycubrid.__version__)"
          /tmp/test-wheel/bin/python -c "import pycubrid.aio; print('async OK')"
          /tmp/test-wheel/bin/python -c "from pycubrid import connect, Date, Time, Timestamp, Binary; print('public API OK')"
      - name: Smoke test sdist install
        run: |
          python -m venv /tmp/test-sdist
          /tmp/test-sdist/bin/pip install dist/*.tar.gz
          cd /tmp
          /tmp/test-sdist/bin/python -c "import pycubrid; print(pycubrid.__version__)"

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint, offline-tests, packaging-smoke-test]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
        cubrid-version: ["10.2", "11.0", "11.2", "11.4"]
    services:
      cubrid:
        image: cubrid/cubrid:${{ matrix.cubrid-version }}
        env:
          CUBRID_DB: testdb
        ports:
          - 33000:33000
        options: >-
          --health-cmd "csql -u dba testdb -c 'SELECT 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pycubrid
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Wait for CUBRID readiness
        run: |
          for i in $(seq 1 30); do
            if python -c "
          from pycubrid import connect
          try:
              conn = connect('CUBRID:localhost:33000:testdb:::', user='dba', password='')
              cur = conn.cursor()
              cur.execute('SELECT 1')
              cur.close()
              conn.close()
              print('CUBRID ready')
              exit(0)
          except Exception as e:
              print(f'Not ready: {e}')
              exit(1)
          "; then
              break
            fi
            echo "Waiting for CUBRID... (attempt $i/30)"
            sleep 5
          done
      - name: Run integration tests
        env:
          CUBRID_TEST_URL: "cubrid://dba@localhost:33000/testdb"
        run: |
          python -m pytest tests/test_integration.py -v --tb=short
